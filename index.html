<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ACE × AZRAS | Urban Management Philosophy for the AI Era</title>
  <meta name="description" content="AZRAS is an Adaptive Zero-Rebuild Asset System for sustainable urban infrastructure in the AI era." />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* =========================================================
       FIRST VIEW: fixed visual mockup with transparent links
       ========================================================= */
    .first-view {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: #fff;
    }

    .top-visual {
      width: 100%;
      height: auto;
      display: block;
    }

    .hotspot {
      position: absolute;
      z-index: 10;
      display: block;
      background: rgba(90, 61, 255, 0);
      border-radius: 8px;
    }

    .hotspot:hover {
      background: rgba(90, 61, 255, 0.08);
      outline: 1px solid rgba(90, 61, 255, 0.25);
    }

    /* Header navigation hotspots */
    .hs-about     { top: 2.2%; left: 54.5%; width: 5.0%; height: 4.2%; }
    .hs-vision    { top: 2.2%; left: 60.5%; width: 5.0%; height: 4.2%; }
    .hs-azras     { top: 2.2%; left: 66.4%; width: 5.0%; height: 4.2%; }
    .hs-projects  { top: 2.2%; left: 72.4%; width: 6.0%; height: 4.2%; }
    .hs-documents { top: 2.2%; left: 79.6%; width: 7.0%; height: 4.2%; }
    .hs-contact   { top: 2.2%; left: 87.4%; width: 6.0%; height: 4.2%; }

    /* Hero buttons */
    .hs-explore   { top: 52.2%; left: 5.0%; width: 12.8%; height: 6.6%; }

    /* Service blocks */
    .hs-architecture { top: 66.5%; left: 5.5%; width: 19.0%; height: 10.5%; }
    .hs-construction { top: 66.5%; left: 28.5%; width: 19.0%; height: 10.5%; }
    .hs-estate       { top: 66.5%; left: 51.5%; width: 19.0%; height: 10.5%; }
    .hs-energy       { top: 66.5%; left: 74.5%; width: 19.0%; height: 10.5%; }

    /* Project cards */
    .hs-project-1 { top: 81.0%; left: 5.5%; width: 24.0%; height: 16.0%; }
    .hs-project-2 { top: 81.0%; left: 31.0%; width: 27.0%; height: 16.0%; }
    .hs-project-3 { top: 81.0%; left: 59.5%; width: 24.0%; height: 16.0%; }

    /* =========================================================
       LOWER CONTENT SECTIONS
       ========================================================= */
    section {
      padding: 96px 8vw;
    }

    .section-dark {
      background: #0b0b0d;
      color: #fff;
    }

    .section-light {
      background: #fff;
      color: #111;
    }

    .section-gray {
      background: #f1f2f4;
      color: #111;
    }
</html>


</body>
</html>
